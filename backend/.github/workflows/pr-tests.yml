name: PR Unit Tests

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore HapagPortal.sln

      - name: Build solution
        run: dotnet build HapagPortal.sln --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test HapagPortal.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true
