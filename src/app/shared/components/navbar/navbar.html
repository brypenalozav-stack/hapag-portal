<nav class="navbar navbar-dark fixed-top hl-navbar px-3">
  <div class="d-flex align-items-center gap-3">
    <!-- Mobile hamburger -->
    @if (auth.isAuthenticated()) {
      <button class="btn btn-link text-white d-lg-none p-0" (click)="onToggleSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
        </svg>
      </button>
    }

    <!-- Logo -->
    <a class="navbar-brand mb-0 d-flex align-items-center gap-2" routerLink="/dashboard">
      <svg viewBox="0 0 280 50" xmlns="http://www.w3.org/2000/svg" height="32">
        <rect x="0" y="3" width="44" height="44" rx="6" fill="#FF6600"/>
        <text x="22" y="34" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="800" font-size="22" fill="#FFFFFF">HL</text>
        <text x="54" y="24" font-family="Montserrat, sans-serif" font-weight="700" font-size="18" fill="#FFFFFF">Hapag-Lloyd</text>
        <text x="54" y="40" font-family="Inter, sans-serif" font-weight="300" font-size="9" fill="rgba(255,255,255,0.6)" letter-spacing="2.5">PORTAL DE SERVICIOS</text>
      </svg>
    </a>
  </div>

  <div class="d-flex align-items-center gap-3">
    @if (auth.isAuthenticated()) {
      <!-- Country indicator -->
      <span class="badge bg-white bg-opacity-10 text-white d-none d-md-inline-flex align-items-center gap-1 px-2 py-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10m0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6"/>
        </svg>
        {{ auth.getCountry() === 'CL' ? 'Chile' : 'Bolivia' }}
      </span>

      <!-- User menu -->
      <div class="dropdown">
        <button class="btn btn-link text-white text-decoration-none dropdown-toggle d-flex align-items-center gap-2 p-0"
                type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
          </svg>
          <span class="d-none d-md-inline" style="font-size: 0.85rem;">{{ auth.currentUser()?.name }}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><span class="dropdown-item-text small text-muted">{{ auth.currentUser()?.email }}</span></li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <a class="dropdown-item" routerLink="/profile">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="me-2" viewBox="0 0 16 16">
                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
              </svg>
              Mi Perfil
            </a>
          </li>
          <li>
            <button class="dropdown-item" (click)="logout()">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="me-2" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
                <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
              </svg>
              Cerrar Sesión
            </button>
          </li>
        </ul>
      </div>
    } @else {
      <a routerLink="/login" class="btn btn-outline-light btn-sm">Iniciar Sesión</a>
    }
  </div>
</nav>
